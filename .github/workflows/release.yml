name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create zip
      run: zip -r xi-measure-addon.zip . -x ".git/*"

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: xi-measure-addon.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
